<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Fibo</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=9">
  <style>
    .admin-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 72px); }
    .sidebar { background: var(--bg-2); border-right: 1px solid var(--border); padding: 24px 0; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; color: var(--text-2); font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); }
    .sidebar-item:hover { color: #fff; background: rgba(255,255,255,.03); }
    .sidebar-item.active { color: #fff; background: rgba(255,255,255,.04); border-right: 2px solid var(--accent); }
    .admin-content { padding: 32px; overflow-y: auto; }
    .page-section { display: none; }
    .page-section.active { display: block; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th { text-align: left; padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-3); border-bottom: 1px solid var(--border); }
    .admin-table td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text-2); }
    .admin-table tr:hover td { background: rgba(255,255,255,.02); }
    .status-paid { color: var(--accent); }
    .status-pending { color: #F5A623; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 500; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg-3); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
    .stat-card { background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
    .stat-number { font-family: 'Exo 2', sans-serif; font-size: 28px; font-weight: 900; color: #fff; }
    .stat-label { font-size: 12px; color: var(--text-3); margin-top: 4px; }
    @media (max-width: 768px) {
      .admin-layout { grid-template-columns: 1fr; }
      .sidebar { display: flex; overflow-x: auto; padding: 12px; gap: 8px; border-right: none; border-bottom: 1px solid var(--border); }
      .sidebar-item { white-space: nowrap; padding: 8px 16px; border-radius: 8px; }
      .sidebar-item.active { border-right: none; background: rgba(255,255,255,.06); }
      .admin-content { padding: 16px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-logo">Fi<span>bo</span></a>
  <div class="nav-right">
    <span id="adminEmail" style="color:var(--text-3);font-size:12px;"></span>
    <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Đăng xuất</button>
  </div>
</nav>

<!-- LOGIN -->
<div id="loginPage" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 72px);">
  <div class="glass" style="padding:40px;width:100%;max-width:380px;">
    <h2 style="font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;margin-bottom:24px;text-align:center;">Admin Login</h2>
    <form onsubmit="handleLogin(event)">
      <div class="form-group" style="margin-bottom:16px;">
        <label class="label">Email</label>
        <input type="email" class="input" id="loginEmail" required>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="label">Mật khẩu</label>
        <input type="password" class="input" id="loginPassword" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="loginBtn">Đăng nhập</button>
      <p id="loginError" style="color:#EF4444;font-size:12px;text-align:center;margin-top:12px;display:none;"></p>
    </form>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <div class="admin-layout">
    <div class="sidebar">
      <div class="sidebar-item active" onclick="switchPage('dashboard')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item" onclick="switchPage('orders')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
        Đơn hàng
      </div>
      <div class="sidebar-item" onclick="switchPage('products')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Khóa học
      </div>
    </div>

    <div class="admin-content">
      <!-- DASHBOARD -->
      <div id="page-dashboard" class="page-section active">
        <h2 style="font-size:20px;font-weight:800;margin-bottom:24px;">Dashboard</h2>
        <div class="grid-4">
          <div class="stat-card">
            <div class="stat-number" id="statOrders">0</div>
            <div class="stat-label">Tổng đơn hàng</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statRevenue">0</div>
            <div class="stat-label">Doanh thu (VNĐ)</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statPaid">0</div>
            <div class="stat-label">Đã thanh toán</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statPending">0</div>
            <div class="stat-label">Chờ thanh toán</div>
          </div>
        </div>
      </div>

      <!-- ORDERS -->
      <div id="page-orders" class="page-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <h2 style="font-size:20px;font-weight:800;">Đơn hàng</h2>
          <select class="input" style="width:auto;padding:8px 14px;font-size:12px;" id="orderFilter" onchange="loadOrders()">
            <option value="all">Tất cả</option>
            <option value="paid">Đã thanh toán</option>
            <option value="pending">Chờ thanh toán</option>
          </select>
        </div>
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Email</th><th>Tổng tiền</th><th>Trạng thái</th><th>Ngày tạo</th></tr></thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
        <p id="ordersEmpty" style="color:var(--text-3);font-size:13px;text-align:center;padding:40px 0;display:none;">Chưa có đơn hàng nào.</p>
      </div>

      <!-- PRODUCTS -->
      <div id="page-products" class="page-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <h2 style="font-size:20px;font-weight:800;">Khóa học</h2>
          <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ Thêm khóa học</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead><tr><th>Tên</th><th>Giá</th><th>Số bài</th><th>Học viên</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
            <tbody id="productsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h3 style="font-size:18px;font-weight:800;" id="modalTitle">Thêm khóa học</h3>
      <button onclick="closeProductModal()" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:20px;">&times;</button>
    </div>
    <form onsubmit="saveProduct(event)">
      <input type="hidden" id="productId">
      <div style="margin-bottom:16px;"><label class="label">Tên khóa học</label><input type="text" class="input" id="productName" required></div>
      <div style="margin-bottom:16px;"><label class="label">Giá (VNĐ)</label><input type="number" class="input" id="productPrice" required></div>
      <div style="margin-bottom:16px;"><label class="label">Số bài học</label><input type="number" class="input" id="productLessons"></div>
      <div style="margin-bottom:16px;"><label class="label">Mô tả</label><textarea class="input" id="productDesc" rows="3" style="resize:vertical;"></textarea></div>
      <div style="margin-bottom:20px;"><label class="label">URL ảnh</label><input type="url" class="input" id="productImage" placeholder="https://..."></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Lưu</button>
    </form>
  </div>
</div>

<script type="module">
import { db, auth, collection, getDocs, doc, setDoc, deleteDoc, updateDoc, query, orderBy, where, signInWithEmailAndPassword, onAuthStateChanged, signOut, serverTimestamp } from '/firebase.js';

window.db = db;
window.auth = auth;

onAuthStateChanged(auth, function(user) {
  if (user) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('adminEmail').textContent = user.email;
    loadDashboard();
  } else {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
  }
});

window.handleLogin = async function(e) {
  e.preventDefault();
  var email = document.getElementById('loginEmail').value;
  var password = document.getElementById('loginPassword').value;
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginError');
  btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (error) {
    err.textContent = 'Email hoặc mật khẩu không đúng';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Đăng nhập';
  }
};

window.handleLogout = function() { signOut(auth); };

window.switchPage = function(page) {
  document.querySelectorAll('.page-section').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.sidebar-item').forEach(function(s) { s.classList.remove('active'); });
  event.currentTarget.classList.add('active');
  switch(page) {
    case 'dashboard': loadDashboard(); break;
    case 'orders': loadOrders(); break;
    case 'products': loadProducts(); break;
  }
};

async function loadDashboard() {
  try {
    var snapshot = await getDocs(collection(db, 'orders'));
    var orders = snapshot.docs.map(function(d) { return d.data(); });
    var paid = orders.filter(function(o) { return o.paymentStatus === 'paid'; });
    var revenue = paid.reduce(function(sum, o) { return sum + (o.total || 0); }, 0);
    document.getElementById('statOrders').textContent = orders.length;
    document.getElementById('statRevenue').textContent = revenue.toLocaleString('vi-VN');
    document.getElementById('statPaid').textContent = paid.length;
    document.getElementById('statPending').textContent = orders.length - paid.length;
  } catch (e) { console.error(e); }
}

window.loadOrders = async function() {
  try {
    var filter = document.getElementById('orderFilter').value;
    var q = filter === 'all'
      ? query(collection(db, 'orders'), orderBy('createdAt', 'desc'))
      : query(collection(db, 'orders'), where('paymentStatus', '==', filter));
    var snapshot = await getDocs(q);
    var tbody = document.getElementById('ordersBody');
    var empty = document.getElementById('ordersEmpty');
    if (snapshot.empty) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = snapshot.docs.map(function(d) {
      var o = d.data();
      var statusClass = o.paymentStatus === 'paid' ? 'status-paid' : 'status-pending';
      var statusText = o.paymentStatus === 'paid' ? 'Đã thanh toán' : 'Chờ thanh toán';
      var date = o.createdAt ? new Date(o.createdAt).toLocaleDateString('vi-VN') : '-';
      return '<tr><td>' + (o.orderNumber||d.id) + '</td><td>' + (o.customer?.name||'-') + '</td><td>' + (o.customer?.email||'-') + '</td><td>' + (o.total||0).toLocaleString('vi-VN') + 'đ</td><td class="' + statusClass + '">' + statusText + '</td><td>' + date + '</td></tr>';
    }).join('');
  } catch (e) { console.error(e); }
};

window.loadProducts = async function() {
  try {
    var snapshot = await getDocs(collection(db, 'products'));
    var tbody = document.getElementById('productsBody');
    tbody.innerHTML = snapshot.docs.map(function(d) {
      var p = d.data();
      return '<tr><td style="font-weight:600;color:#fff;">' + p.name + '</td><td>' + (p.price||0).toLocaleString('vi-VN') + 'đ</td><td>' + (p.lessons||'-') + '</td><td>' + (p.students||0) + '</td><td>' + (p.active ? '<span style="color:var(--accent);">Active</span>' : 'Draft') + '</td><td><button class="btn btn-ghost btn-sm" onclick="editProduct(\'' + d.id + '\')">Sửa</button> <button class="btn btn-ghost btn-sm" onclick="deleteProduct(\'' + d.id + '\')">Xóa</button></td></tr>';
    }).join('');
  } catch (e) { console.error(e); }
};

window.openProductModal = function(data) {
  document.getElementById('productModal').classList.add('show');
  document.getElementById('modalTitle').textContent = data ? 'Sửa khóa học' : 'Thêm khóa học';
  document.getElementById('productId').value = data ? data.id : '';
  document.getElementById('productName').value = data ? data.name : '';
  document.getElementById('productPrice').value = data ? data.price : '';
  document.getElementById('productLessons').value = data ? data.lessons : '';
  document.getElementById('productDesc').value = data ? data.description : '';
  document.getElementById('productImage').value = data ? data.image : '';
};

window.closeProductModal = function() { document.getElementById('productModal').classList.remove('show'); };

window.editProduct = async function(id) {
  var snap = await getDocs(collection(db, 'products'));
  var found = snap.docs.find(function(d) { return d.id === id; });
  if (found) openProductModal(Object.assign({ id: found.id }, found.data()));
};

window.saveProduct = async function(e) {
  e.preventDefault();
  var id = document.getElementById('productId').value;
  var data = {
    name: document.getElementById('productName').value,
    price: Number(document.getElementById('productPrice').value),
    lessons: Number(document.getElementById('productLessons').value) || 0,
    description: document.getElementById('productDesc').value,
    image: document.getElementById('productImage').value,
    active: true,
    updatedAt: new Date().toISOString()
  };
  if (!id) { data.createdAt = new Date().toISOString(); data.students = 0; }
  var docId = id || 'product_' + Date.now();
  await setDoc(doc(db, 'products', docId), data, { merge: true });
  closeProductModal();
  loadProducts();
};

window.deleteProduct = async function(id) {
  if (!confirm('Xóa khóa học này?')) return;
  await deleteDoc(doc(db, 'products', id));
  loadProducts();
};
</script>
</body>
</html>
