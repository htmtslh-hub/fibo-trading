<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../favicon.png">
  <title>Giỏ hàng — Fibo</title>
  <meta name="description" content="Giỏ hàng của bạn tại Fibo">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=9">
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-logo"><img src="../fibo_logo.png" alt="Fibo" class="nav-logo-img">Fi<span>bo</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">Trang chủ</a></li>
    <li><a href="blog.html">Bài viết</a></li>
    <li><a href="courses.html">Khóa học</a></li>
  </ul>
  <div class="nav-right">
    <button class="cart-icon" onclick="openSearch()" title="Tìm kiếm (Ctrl+K)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <a href="cart.html" class="cart-icon" style="border-color:var(--border-hover);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge hidden" id="cartBadge">0</span>
    </a>
    <a href="course-detail.html?id=1" class="btn btn-primary btn-sm">Khóa học Pro</a>
  </div>
  <div class="nav-mobile-toggle">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </div>
</nav>

<section class="section" style="padding-top:40px;">
  <div class="wrap">
    <h1 style="font-family:'Exo 2',sans-serif;font-size:28px;font-weight:900;margin-bottom:32px;">Giỏ hàng</h1>

    <!-- Empty state -->
    <div id="cartEmpty" class="hidden" style="text-align:center;padding:60px 0;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.5" style="margin:0 auto 16px;display:block;"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <p style="color:var(--text-3);font-size:15px;margin-bottom:20px;">Giỏ hàng trống</p>
      <a href="courses.html" class="btn btn-outline">Xem khóa học</a>
    </div>

    <!-- Cart items -->
    <div id="cartItems"></div>

    <!-- Cart footer -->
    <div id="cartFooter" class="hidden" style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
        <div>
          <span style="color:var(--text-2);font-size:14px;">Tổng cộng:</span>
          <span id="cartTotal" style="font-family:'Exo 2',sans-serif;font-size:28px;font-weight:900;color:#fff;margin-left:12px;"></span>
        </div>
        <div style="display:flex;gap:12px;">
          <button class="btn btn-ghost btn-sm" onclick="clearAll()">Xóa tất cả</button>
          <a href="checkout.html" class="btn btn-primary btn-lg">Thanh toán</a>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="wrap">
    <div class="footer-bottom" style="margin-top:0;padding-top:0;border:none;">&copy; 2024 Fibo. All rights reserved.</div>
  </div>
</footer>

<script src="../js/cart-badge.js?v=1"></script>
<script src="../js/search.js?v=1"></script>
<script>
function renderCart() {
  var cart = Cart.get();
  var itemsEl = document.getElementById('cartItems');
  var emptyEl = document.getElementById('cartEmpty');
  var footerEl = document.getElementById('cartFooter');
  var totalEl = document.getElementById('cartTotal');

  if (cart.length === 0) {
    emptyEl.classList.remove('hidden');
    itemsEl.innerHTML = '';
    footerEl.classList.add('hidden');
    return;
  }

  emptyEl.classList.add('hidden');
  footerEl.classList.remove('hidden');

  itemsEl.innerHTML = cart.map(function(item) {
    return '<div class="glass" style="padding:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">' +
      '<div style="display:flex;align-items:center;gap:16px;">' +
        '<div style="width:60px;height:60px;border-radius:10px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;">' +
          '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg>' +
        '</div>' +
        '<div>' +
          '<div style="font-weight:600;font-size:15px;">' + item.name + '</div>' +
          '<div style="color:var(--text-3);font-size:12px;">Truy cập trọn đời</div>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:20px;">' +
        '<span style="font-family:\'Exo 2\',sans-serif;font-weight:800;font-size:16px;">' + item.price.toLocaleString('vi-VN') + 'đ</span>' +
        '<button onclick="removeItem(\'' + item.id + '\')" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text-3);transition:var(--transition);" onmouseover="this.style.borderColor=\'var(--border-hover)\';this.style.color=\'#fff\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--text-3)\'">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>';
  }).join('');

  totalEl.textContent = Cart.total().toLocaleString('vi-VN') + 'đ';
}

function removeItem(id) {
  Cart.remove(id);
  renderCart();
}

function clearAll() {
  Cart.clear();
  renderCart();
}

renderCart();
</script>
<script src="../js/anti-screenshot.js?v=1"></script>
</body>
</html>
